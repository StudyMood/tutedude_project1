<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CI Calculator</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Button */
button {
    background: #2da9e3;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

/* Transform Effect */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* Result */
.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h2>CI Calculator</h2>

    <input type="number" id="principal" placeholder="Principal (₹)">
    <input type="number" id="rate" placeholder="Rate (%)">
    <input type="number" id="time" placeholder="Time (Years)">

    <button onclick="calculateCI()">Calculate</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateCI() {
    let P = document.getElementById("principal").value;
    let R = document.getElementById("rate").value;
    let T = document.getElementById("time").value;

    let amount = P * Math.pow((1 + R / 100), T);
    let CI = amount - P;

    document.getElementById("result").innerHTML =
        "Compound Interest: ₹" + CI.toFixed(2);
}
</script>

</body>
</html>
